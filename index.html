<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบออกบิลค่าน้ำ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>ระบบออกบิลค่าน้ำ</h2>
    
    <label for="houseNumber">บ้านเลขที่:</label>
    <input type="text" id="houseNumber"><br><br>

    <label for="prevMeter">เลขมิเตอร์ครั้งก่อน:</label>
    <input type="number" id="prevMeter"><br><br>

    <label for="currentMeter">เลขมิเตอร์ครั้งนี้:</label>
    <input type="number" id="currentMeter"><br><br>

    <label for="otherFee">ค่าบริการอื่นๆ:</label>
    <input type="number" id="otherFee" placeholder="กรอกค่าบริการอื่นๆ (ถ้ามี)"><br><br>

    <button onclick="generateBill()">สร้างบิล</button>
    <button onclick="printBill()">พิมพ์บิล</button>

    <div id="billOutput"></div>

    <script src="script.js"></script>
</body>
</html>
